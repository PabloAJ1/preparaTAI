openapi: 3.1.0
info:
  title: PreparaTAI API
  version: 1.0.0

servers:
    - url: /api
      variables:
        port:
            enum:
                - '3000'
            default: '80'

paths:
  /pregunta:
    get:
      tags:
        - preguntas
      summary: Obtener preguntas
      operationId: getAllPreguntas
      responses:
        '200':
          description: Lista de preguntas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pregunta'

    post:
      tags:
        - preguntas
      summary: Guardar una pregunta
      operationId: createPregunta
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Pregunta'
      responses:
        '200':
          description: Pregunta guardada con exito
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pregunta'

  /pregunta/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: el identificador de la pregunta
        schema:
          type: string
    get:
      tags:
        - preguntas
      summary: Obtener una pregunta por id
      operationId: getOnePreguntasById
      responses:
        '200':
          description: Pregunta por ID
          content:
            application/json:
              schema:
                  $ref: '#/components/schemas/Pregunta'
    patch:
      tags:
        - preguntas
      summary: Actualizar una pregunta por id
      operationId: updatePreguntaById
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Pregunta'
      responses:
        '200':
          description: Pregunta actualizada por ID
          content:
            application/json:
              schema:
                  $ref: '#/components/schemas/Pregunta'
    delete:
      tags:
        - preguntas
      summary: Eliminar una pregunta por id
      operationId: deletePreguntaById
      responses:
        '204':
          description: Pregunta eliminada por ID

  /pregunta/{id}/intentos:
    post:
      tags:
        - preguntas
      summary: Registrar intento de respuesta a una pregunta
      operationId: registrarIntentoPregunta
      parameters:
        - name: id
          in: path
          required: true
          description: Identificador de la pregunta
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - acertada
              properties:
                acertada:
                  type: boolean
                  description: Indica si la respuesta fue correcta
      responses:
        '204':
          description: Intento registrado correctamente, sin contenido de respuesta

  /pregunta/{id}/enterrar:
    post:
      tags:
        - preguntas
      summary: Entierra la pregunta para que no salga
      operationId: enterrarPregunta
      parameters:
        - name: id
          in: path
          required: true
          description: Identificador de la pregunta
          schema:
            type: string
      responses:
        '204':
          description: Pregunta enterrada

  /pregunta/{id}/revisar:
    post:
      tags:
        - preguntas
      summary: Marca la pregunta para ser revisada
      operationId: marcarParaRevisar
      parameters:
        - name: id
          in: path
          required: true
          description: Identificador de la pregunta
          schema:
            type: string
      responses:
        '204':
          description: Pregunta marcada para revisar
    
  /pregunta/todas/desenterrar:
    get:
      tags:
        - preguntas
      summary: Desentierrar todas las preguntas de la base de datos
      operationId: desenterrarTodasLasPreguntas
      responses:
        '204':
          description: Todas las preguntas fueron desenterradas

  /pregunta/getNumeroDePreguntas:
    get:
      tags:
        - preguntas
      summary: Obtener el numero de preguntas actuales en la base de datos
      operationId: getNumeroDePreguntas
      responses:
        '200':
          description: Numero de preguntas en la abse de datos
          content:
            application/json:
              schema:
                  type: integer

  /pregunta/porCategoria/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: el identificador de la pregunta
        schema:
          type: string
      - name: page
        in: query
        required: false
        description: Número de página (empieza en 1)
        schema:
          type: integer
          default: 1
      - name: limit
        in: query
        required: false
        description: Número de preguntas por página
        schema:
          type: integer
          default: 20
      - name: seed
        in: query
        required: false
        description: Semilla para randomizar las preguntas
        schema:
          type: integer
          default: 0
    get:
      tags:
        - preguntas
      summary: Obtener las preguntas que pertenecen a una categoria dada
      operationId: getPreguntasPorCategoria
      responses:
        '200':
          description: Pregunta que pertenecen a una categoria
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListaDePreguntasPorCategoria'

  /pregunta/estadisticas/reiniciar:
    get:
      tags:
        - preguntas
      summary: Reincia las estadisticas de las preguntas 
      operationId: reiniciarContadorDeEstadisticas
      responses:
        '204':
          description: Estadisticas reiniciadas

  /categoria:
    get:
      summary: Obtener categorias
      tags:
        - categorias
      operationId: getAllCategorias
      responses:
        '200':
          description: Lista de categorias
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Categoria'
    post:
      tags:
        - categorias
      summary: Guardar una categoria
      operationId: createCategoria
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoriaNueva'
      responses:
        '200':
          description: Categoria guardada con exito
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Categoria'

  /categoria/resumen:
    parameters:
      - name: tipo
        in: query
        required: false
        description: Tipo de Cateogiras que queremos (Cuestionarios / No Cuestionarios)
        schema:
          type: string
          default: CUESTIONARIOS
    get:
      summary: Obtener categorias con número de preguntas
      tags:
        - categorias
      operationId: getCategoriasResumen
      responses:
        '200':
          description: Lista de categorias con número de preguntas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoriaResumen'

  /categoria/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: el identificador de la categoria
        schema:
          type: string
    get:
      tags:
        - categorias
      summary: Obtener una categoria por id
      operationId: getOneCategoriaById
      responses:
        '200':
          description: Categoria por ID
          content:
            application/json:
              schema:
                  $ref: '#/components/schemas/Categoria'

  /gruposDePreguntasRelacionadas:
    get:
      summary: Obtener Grupos de Preguntas GrupoPreguntasRelacionadas
      operationId: getAllGruposDePreguntasRelacionadas
      tags:
        - gruposDePreguntasRelacionadas
        - preguntas
      responses:
        '200':
          description: Listado de preguntas GrupoPreguntasRelacionadas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GrupoPreguntasRelacionadas'

  /gruposDePreguntasRelacionadas/porCategoria/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: el identificador de la categoria
        schema:
          type: string
    get:
      summary: Obtener Grupos de Preguntas GrupoPreguntasRelacionadas por Categoria
      operationId: getAllGruposPreguntasByCategoria
      tags:
        - gruposDePreguntasRelacionadas
        - preguntas
        - categorias
      responses:
        '200':
          description: Listado de preguntas GrupoPreguntasRelacionadas por categproa
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GrupoPreguntasRelacionadas'

  /examenes:
    get:
      summary: Obtener un listado de los Examenes
      operationId: getAllExamenes
      tags:
        - examenes
        - preguntas
      responses:
        '200':
          description: Listado de Examenes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Examen'

  /practica:
    get:
      tags:
        - practicas
      summary: Obtener todas las practicas con estadisticas
      operationId: getAllPracticas
      responses:
        '200':
          description: Listado de Examenes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoriaResumen'
    
  /practica/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: el identificador de la practica
        schema:
          type: string
      - name: page
        in: query
        required: false
        description: Número de página (empieza en 1)
        schema:
          type: integer
          default: 1
      - name: limit
        in: query
        required: false
        description: Número de preguntas por página
        schema:
          type: integer
          default: 20
      - name: seed
        in: query
        required: false
        description: Semilla para randomizar las preguntas
        schema:
          type: integer
          default: 0
    get:
      tags:
        - practicas
      summary: Obtener una practica por id
      operationId: getPracticaById
      responses:
        '200':
          description: Listado de preguntas de la practica
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Practica'


  /practica/crearPractica:
    post:
      tags:
        - practicas
      summary: Guardar una practica
      operationId: createPractica
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PracticaNueva'
      responses:
        '204':
          description: Practica creada

  /practica/migracion:
    get:
      tags:
        - practicas
      summary: Migra las preguntas a practicas
      operationId: migracionPracticas
      responses:
        '204':
          description: Registros migrados

  /shared/inicializarDB:
    get:
      tags:
        - admin
      summary: Borrar la bd actual y la inicializa
      operationId: inicializarDB
      responses:
        '204':
          description: Base de datos inicializada

components:
  schemas:
    Categoria:
      type: object
      properties:
        id:
          type: string
        nombre:
          type: string
        tipo:
          type: string
      required:
        - id
        - nombre
        - tipo

    CategoriaNueva:
      type: object
      properties:
        nombre:
          type: string
      required:
        - nombre

    CategoriaResumen:
      type: object
      properties:
        id:
          type: string
          example: 0000-00000-0000000-0000
        nombre:
          type: string
          example: Java
        numeroPreguntas:
          type: integer
          example: 35
        estadisticas:
          $ref: '#/components/schemas/Estadistica'
      required:
        - id
        - nombre
        - numeroPreguntas
        - estadisticas

    Respuesta:
      type: object
      properties:
        enunciado:
          type: string
        id:
          type: string
        correcta:
          type: boolean
      required:
        - enunciado
        - correcta
        - id

    Estadistica:
      type: object
      properties:
        aciertos:
          type: integer
        fallos:
          type: integer
        total:
          type: integer
      required:
        - aciertos
        - fallos
        - total

    Pregunta:
      type: object
      properties:
        id:
          type: string
        enunciado:
          type: string
        codigo:
          type: string
        estado:
          type: string
        respuestas:
          type: array
          items:
            $ref: '#/components/schemas/Respuesta'
        categorias:
          type: array
          items:
            $ref: '#/components/schemas/Categoria'
        estadisticas:
            $ref: '#/components/schemas/Estadistica'
      required:
        - id
        - enunciado
        - respuestas
        - estadisticas
        - estado
    
    ListaDePreguntasPorCategoria:
      type: object
      properties:
        idCategoriaPrincipal:
          type: string
        nombreCategoriaPrincipal:
          type: string
        preguntas:
          type: array
          items:
            $ref: '#/components/schemas/Pregunta'
      required:
        - idCategoriaPrincipal
        - nombreCategoriaPrincipal
        - preguntas

    PreguntaNueva:
      type: object
      properties:
        enunciado:
          type: string
        codigo:
          type: string
        estado:
          type: string
        respuestas:
          type: array
          items:
            $ref: '#/components/schemas/Respuesta'
        categorias:
          type: array
          items:
            $ref: '#/components/schemas/Categoria'
      required:
        - id
        - enunciado
        - respuestas
        - estado
        - categorias

    PreguntaPracticaNueva:
      type: object
      properties:
        enunciado:
          type: string
        respuesta:
          type: string
      required:
        - enunciado
        - respuesta

    PracticaNueva:
      type: object
      properties:
        estado:
          type: string
        pregunta:
          type: array
          items:
            $ref: '#/components/schemas/PreguntaPracticaNueva'
        nombrePractica:
          type: string
      required:
        - pregunta
        - estado
        - nombrePractica

    PreguntaUpdate:
      type: object
      properties:
        enunciado:
          type: string
      required:
        - enunciado

    GrupoPreguntasRelacionadas:
      type: object
      properties:
        id:
          type: string
        idGrupoPregunta:
          type: string
        textoPre:
          type: string
        textoPos:
          type: string
        codigo:
          type: string
        lenguaje:
          type: string
        preguntas:
          type: array
          items:
            $ref: '#/components/schemas/Pregunta'
      required:
        - id
        - textoPre
        - preguntas
        - idGrupoPregunta
        - codigo
        - lenguaje

    Examen:
      type: object
      properties:
        id:
          type: string
        nombre:
          type: string
        anio:
          type: integer
        grupo:
          type: string
        subgrupo: 
          type: string
        preguntas:
          type: array
          items:
            oneOf:
              - $ref: '#/components/schemas/Pregunta'
              - $ref: '#/components/schemas/GrupoPreguntasRelacionadas'
      required:
        - id
        - nombre

    Estado:
      type: string
      enum:
        - GPT
        - VERIFICADO
        - REVISADO
        - ENTERRADO
        - DESENTERRADO
        - MARCADO

    Practica: 
      type: object
      properties:
        idPractica:
          type: string
        nombrePractica:
          type: string
        preguntas:
          type: array
          items:
            $ref: '#/components/schemas/Pregunta'
      required:
        - idPractica
        - nombrePractica
        - preguntas