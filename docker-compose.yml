services:
  mongo:
    image: mongo:8.0
    container_name: mongodbPreparaTic
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: preparaTAI
      MONGO_INITDB_ROOT_PASSWORD: preparaTAI
      MONGO_INITDB_DATABASE: preparaTAI
    ports:
      - '27017:27017'
    volumes:
      - mongo-data-tai:/data/db

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: preparaTAIApp
    restart: always
    depends_on:
      - mongo
    environment:
      NODE_ENV: production
      ENVIROMENT: production
      HOST: ${HOST}
      MONGO_ATLAS: ${MONGO_ATLAS}
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_SERVER: ${MONGO_SERVER}
      MONGO_DB: ${MONGO_DB}
      MONGO_AUTH: ${MONGO_AUTH}
      MONGO_TYPE: ${MONGO_TYPE}
      MONGO_EXT_TYPE: ${MONGO_EXT_TYPE}
      MONGO_EXT_USER: ${MONGO_EXT_USER}
      MONGO_EXT_PASSWORD: ${MONGO_EXT_PASSWORD}
      MONGO_EXT_SERVER: ${MONGO_EXT_SERVER}
      MONGO_EXT_DB: ${MONGO_EXT_DB}
      VITE_API_BASE_URL: /api
    ports:
      - '3005:3000'

volumes:
  mongo-data-tai:

networks:
  default:
    name: prepraTicNetwork
